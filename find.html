<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Parkd — Find Parking</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=chillax@600,700&f[]=satoshi@400,500,700,900&display=swap"/>
<style>
:root{--black:#10100e;--gray-d3:#191815;--gray-d2:#30302b;--gray-d1:#606055;--gray-b:#c0c0ab;--gray-l1:#e8e8cf;--gray-l2:#f8f8dd;--white:#FFFFE3;--font-logo:'Chillax',sans-serif;--font-main:'Satoshi',sans-serif;--font-mono:'Space Mono',monospace;--ease:cubic-bezier(0.16,1,0.3,1);--sidebar:220px;--topbar:56px;--botnav:60px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html{height:100%}
body{min-height:100%;background:var(--white);color:var(--black);font-family:var(--font-main);-webkit-font-smoothing:antialiased;overflow-x:hidden;cursor:none}a{text-decoration:none;color:inherit}
.cur{position:fixed;top:0;left:0;width:10px;height:10px;background:var(--white);border-radius:50%;pointer-events:none;z-index:9999;will-change:transform;mix-blend-mode:difference}
.cur-r{position:fixed;top:0;left:0;width:36px;height:36px;border:1.5px solid var(--white);border-radius:50%;pointer-events:none;z-index:9998;will-change:transform;mix-blend-mode:difference;transition:width .22s var(--ease),height .22s var(--ease),opacity .22s}
.cur.hov{width:18px;height:18px}.cur-r.hov{width:56px;height:56px;opacity:.6}
.app{display:flex;min-height:100svh}
.sidebar{width:var(--sidebar);background:var(--white);border-right:1px solid var(--gray-l1);position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column;z-index:100}
.sb-logo{height:var(--topbar);display:flex;align-items:center;padding:0 24px;border-bottom:1px solid var(--gray-l1);font-family:var(--font-logo);font-weight:700;font-size:1.3rem;letter-spacing:-.02em;color:var(--black);text-decoration:none;flex-shrink:0}
.sb-nav{flex:1;padding:16px 12px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.sb-section{font-family:var(--font-mono);font-size:.55rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gray-b);padding:14px 12px 6px}
.sb-link{display:flex;align-items:center;gap:10px;padding:10px 12px;font-size:.84rem;font-weight:500;color:var(--gray-d1);transition:background .15s,color .15s;position:relative;cursor:none;text-decoration:none}
.sb-link:hover{background:var(--gray-l2);color:var(--black)}.sb-link.active{background:var(--gray-l2);color:var(--black);font-weight:600}
.sb-link.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:2px;height:18px;background:var(--black)}
.sb-link svg{width:16px;height:16px;flex-shrink:0}
.sb-foot{border-top:1px solid var(--gray-l1);padding:14px 12px}
.sb-user{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:none;transition:background .15s}.sb-user:hover{background:var(--gray-l2)}
.sb-avatar{width:30px;height:30px;background:var(--black);color:var(--white);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:.65rem;font-weight:700;flex-shrink:0}
.sb-uname{font-size:.82rem;font-weight:600;color:var(--black)}.sb-urole{font-size:.68rem;color:var(--gray-b);margin-top:1px}
.main{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column;min-height:100svh}
.topbar{height:var(--topbar);border-bottom:1px solid var(--gray-l1);display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:var(--white);flex-shrink:0}
.topbar-title{font-weight:700;font-size:.95rem;letter-spacing:-.01em;color:var(--black)}.topbar-sub{font-family:var(--font-mono);font-size:.6rem;color:var(--gray-b);margin-top:2px;letter-spacing:.04em}
.icon-btn{width:34px;height:34px;border:1px solid var(--gray-l1);background:var(--white);display:flex;align-items:center;justify-content:center;cursor:none;color:var(--gray-d1);transition:border-color .15s,color .15s;text-decoration:none}
.icon-btn:hover{border-color:var(--black);color:var(--black)}.icon-btn svg{width:15px;height:15px}
.mob-topbar{display:none;height:56px;background:var(--white);border-bottom:1px solid var(--gray-l1);align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0}
.mob-logo{font-family:var(--font-logo);font-weight:700;font-size:1.3rem;letter-spacing:-.02em;color:var(--black)}
.bot-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:var(--botnav);background:var(--white);border-top:1px solid var(--gray-l1);z-index:100;align-items:center;justify-content:space-around;padding:0 8px}
.bn-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 16px;cursor:none;color:var(--gray-b);transition:color .15s;text-decoration:none;position:relative}
.bn-item.active{color:var(--black)}.bn-item.active::before{content:'';position:absolute;top:-1px;left:50%;transform:translateX(-50%);width:20px;height:2px;background:var(--black)}
.bn-item svg{width:21px;height:21px}.bn-label{font-family:var(--font-mono);font-size:.52rem;letter-spacing:.08em;text-transform:uppercase}
.btn{font-family:var(--font-main);font-size:.76rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:10px 20px;border:1.5px solid var(--black);background:transparent;color:var(--black);cursor:none;transition:background .2s,color .2s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn:hover{background:var(--black);color:var(--white)}.btn-f{background:var(--black);color:var(--white)}.btn-f:hover{background:var(--gray-d2)}.btn svg{width:13px;height:13px}

/* FIND SPECIFIC */
.find-layout{flex:1;display:grid;grid-template-columns:1fr 360px;min-height:calc(100svh - var(--topbar))}

/* Map area */
.map-area{position:relative;background:var(--gray-l2);overflow:hidden;border-right:1px solid var(--gray-l1)}
.map-area::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,var(--gray-l1) 1.5px,transparent 1.5px);background-size:28px 28px;opacity:.7}
.map-svg{position:absolute;inset:0;width:100%;height:100%;z-index:1}

/* Search bar overlay */
.map-search{position:absolute;top:20px;left:20px;right:20px;z-index:5;display:flex;gap:0}
.search-input{flex:1;height:44px;background:var(--white);border:1.5px solid var(--black);padding:0 16px;font-family:var(--font-main);font-size:.88rem;color:var(--black);outline:none}
.search-input::placeholder{color:var(--gray-b)}
.search-btn{height:44px;width:44px;background:var(--black);border:1.5px solid var(--black);display:flex;align-items:center;justify-content:center;cursor:none;color:var(--white);flex-shrink:0}
.search-btn svg{width:16px;height:16px}

/* Map pins */
.map-pin{position:absolute;z-index:3;transform:translate(-50%,-100%);cursor:none;transition:transform .2s}
.map-pin:hover{transform:translate(-50%,-100%) scale(1.08)}
.pin-label{background:var(--black);color:var(--white);padding:5px 10px;font-family:var(--font-mono);font-size:.62rem;font-weight:700;letter-spacing:.04em;white-space:nowrap}
.pin-label.sel{background:var(--black)}
.pin-label.dim{background:var(--gray-l1);color:var(--gray-d1);border:1px solid var(--gray-b)}
.pin-tail{width:2px;height:10px;background:var(--black);margin:0 auto}
.pin-tail.dim{background:var(--gray-b)}

/* Filter pills */
.filter-bar{display:flex;gap:0;padding:20px 20px 0;border-bottom:1px solid var(--gray-l1)}
.fpill{padding:8px 16px;font-family:var(--font-main);font-size:.76rem;font-weight:600;color:var(--gray-b);border:1px solid var(--gray-l1);border-right:none;background:var(--white);cursor:none;transition:background .15s,color .15s}
.fpill:last-child{border-right:1px solid var(--gray-l1)}
.fpill.active{background:var(--black);color:var(--white);border-color:var(--black)}
.fpill:not(.active):hover{background:var(--gray-l2);color:var(--black)}

/* Facility cards panel */
.cards-panel{background:var(--white);display:flex;flex-direction:column;overflow-y:auto}
.cards-head{padding:18px 20px;border-bottom:1px solid var(--gray-l1);flex-shrink:0}
.cards-title{font-weight:700;font-size:.9rem;letter-spacing:-.01em;color:var(--black)}
.cards-sub{font-family:var(--font-mono);font-size:.6rem;color:var(--gray-b);margin-top:2px;letter-spacing:.04em}
.facility-card{border-bottom:1px solid var(--gray-l1);padding:18px 20px;cursor:none;transition:background .15s}
.facility-card:hover{background:var(--gray-l2)}
.facility-card.sel{background:var(--gray-l2);border-left:2px solid var(--black)}
.fc-name{font-weight:700;font-size:.88rem;color:var(--black);margin-bottom:4px}
.fc-addr{font-size:.74rem;color:var(--gray-b);margin-bottom:12px}
.fc-zones{display:flex;gap:6px;margin-bottom:12px}
.zone-pill{padding:2px 8px;font-family:var(--font-mono);font-size:.58rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;border:1px solid var(--gray-l1);color:var(--gray-d1)}
.zone-pill.gold{border-color:var(--black);color:var(--black)}
.zone-pill.plat{border-color:var(--black);background:var(--black);color:var(--white)}
.fc-footer{display:flex;align-items:center;justify-content:space-between}
.fc-rate{font-family:var(--font-mono);font-size:.76rem;color:var(--gray-d1)}
.fc-rate b{color:var(--black);font-size:.88rem}
.fc-avail{font-family:var(--font-mono);font-size:.7rem;color:var(--gray-b)}
.fc-avail b{color:var(--black)}
.fc-dist{font-family:var(--font-mono);font-size:.65rem;color:var(--gray-b)}

/* Zone detail slide panel */
.zone-detail{
  position:fixed;bottom:0;left:var(--sidebar);right:0;
  background:var(--white);border-top:1.5px solid var(--black);
  z-index:200;transform:translateY(100%);
  transition:transform .32s var(--ease);
  max-height:50vh;overflow-y:auto;
}
.zone-detail.show{transform:translateY(0)}
.zd-head{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--gray-l1);position:sticky;top:0;background:var(--white);z-index:1}
.zd-title{font-weight:700;font-size:.9rem;color:var(--black)}
.zd-sub{font-size:.74rem;color:var(--gray-b);margin-top:2px}
.close-btn{width:28px;height:28px;border:1px solid var(--gray-l1);display:flex;align-items:center;justify-content:center;cursor:none;color:var(--gray-d1);transition:border-color .15s,color .15s}
.close-btn:hover{border-color:var(--black);color:var(--black)}.close-btn svg{width:13px;height:13px}
.zd-body{padding:16px 24px;display:flex;flex-direction:column;gap:10px}
.zone-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border:1px solid var(--gray-l1);cursor:none;transition:background .15s;text-decoration:none}
.zone-row:hover{background:var(--gray-l2)}
.zr-name{font-weight:600;font-size:.86rem;color:var(--black);margin-bottom:3px}
.zr-meta{font-size:.72rem;color:var(--gray-b)}
.zr-right{display:flex;align-items:center;gap:12px}
.zr-free{font-family:var(--font-mono);font-size:.82rem;font-weight:700;color:var(--black);text-align:right}
.zr-free span{display:block;font-size:.6rem;color:var(--gray-b);font-weight:400}
.zr-arrow svg{width:14px;height:14px;color:var(--gray-b)}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:768px){
  body{cursor:auto}.cur,.cur-r{display:none}
  .sidebar{display:none}.mob-topbar{display:flex}.bot-nav{display:flex}
  .main{margin-left:0}.topbar{display:none}
  .find-layout{grid-template-columns:1fr;grid-template-rows:280px 1fr}
  .map-area{border-right:none;border-bottom:1px solid var(--gray-l1)}
  .zone-detail{left:0}
  .filter-bar{overflow-x:auto;padding:14px 14px 0}
  .fpill{white-space:nowrap;padding:7px 12px}
  .cards-head{padding:14px 16px}
  .facility-card{padding:14px 16px}
  .zd-head,.zd-body{padding:14px 16px}
}
</style>
</head>

<script>
const cur=document.getElementById('cur'),curR=document.getElementById('curR');let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});
(function loop(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;cur.style.transform=`translate3d(${mx}px,${my}px,0) translate(-50%,-50%)`;curR.style.transform=`translate3d(${rx}px,${ry}px,0) translate(-50%,-50%)`;requestAnimationFrame(loop)})();
document.querySelectorAll('a,button,.icon-btn,.sb-user,.bn-item,.facility-card,.map-pin,.close-btn,.zone-row').forEach(el=>{el.addEventListener('mouseenter',()=>{cur.classList.add('hov');curR.classList.add('hov')});el.addEventListener('mouseleave',()=>{cur.classList.remove('hov');curR.classList.remove('hov')})});

</script>
